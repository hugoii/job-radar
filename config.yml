# job-radar filter config — Gmail credentials come from GitHub Secrets.

# Max age of a posting in days. Lower = fresher but fewer hits.
max_days_old: 7

# Only US locations. Filter knows all 50 states + DC + common bare city aliases (SF, NYC, LA).
us_only: true

# Role title must match >= 1 keyword (case-insensitive, word-boundary).
keywords:
  # SWE / Full Stack / Backend / Frontend / Mobile
  - software engineer
  - software developer
  - swe
  - full stack
  - fullstack
  - full-stack
  - backend
  - back-end
  - frontend
  - front-end
  - web developer
  - mobile engineer
  - ios engineer
  - android engineer

  # ML / AI / Data
  - machine learning
  - ml engineer
  - mle
  - ai engineer
  - applied scientist
  - applied ai
  - data scientist
  - data engineer
  - research engineer
  - llm
  - genai

  # Cloud / DevOps / SRE / Platform / Infra
  - cloud engineer
  - devops
  - sre
  - site reliability
  - platform engineer
  - infrastructure engineer
  - systems engineer

  # Product / TPM / FDE / SA
  - product manager
  - apm
  - associate product
  - technical program manager
  - tpm
  - solutions engineer
  - forward deployed
  - solutions architect

# Reject if role title contains any of these (case-insensitive substring).
exclude_keywords:
  # Experience level — NG / 0-2yr is OK, anything above isn't
  - intern
  - internship
  - co-op
  - phd
  - senior
  - "sr."
  - "sr "
  - " sr"
  - "sr,"
  - staff engineer
  - "staff "       # catches "Staff Software Engineer", "Staff Wireless ...", etc.
  - principal
  - "lead "        # catches "Lead Software Engineer", "Lead Data Scientist", etc.
  - lead engineer
  - lead software
  - manager ii
  - engineer 2
  - engineer 3
  - engineer 4
  - engineer ii
  - engineer iii
  - engineer iv
  - level 2
  - level 3
  - level ii
  - level iii
  - mid-level
  - mid level
  # Managerial roles (not PM/APM/TPM which user wants)
  - engineering manager
  - engineering management
  - "manager, solutions"
  - "manager, sales"
  - "manager, customer"
  - "manager, business"
  - "manager, professional"

  # Clearance / citizenship — strong signal of no H1B sponsorship
  - clearance
  - top secret
  - ts/sci
  - polygraph
  - us citizen
  - u.s. citizen
  - u.s citizen
  - citizenship required
  - must be a us citizen
  - dod
  - department of defense
  - public sector
  - federal customer
  - federal services
  - classified
  - government cloud

# Block specific companies (case-insensitive substring on company name).
# Defense / federal contractors — most positions require clearance & US citizenship, no H1B.
# Comment out any you want to re-enable.
company_block:
  - RTX
  - Raytheon
  - Lockheed
  - Northrop
  - General Dynamics
  - Booz Allen
  - L3Harris
  - BAE Systems
  - Leidos
  - SAIC
  - MITRE
  - Amentum
  - CACI
  - ManTech
  - Peraton
  - KBR
  - Aerospace Corp
  - Sandia
  - Lincoln Lab
  - Los Alamos
  - JHU APL
  - Applied Physics Lab
  - Draper
  - Battelle
  - Captivation
  - Altamira
  - Two Six Technologies
  - Riverside Research
  - Parsons
  - Carahsoft
  # Commercial-defense hybrids — most roles require clearance, won't sponsor
  - Anduril
  - Palantir
  - True Anomaly
  - General Matter
  - Torc Robotics
  - PingWind
  - Wyetech
  - Zone 5 Technologies
  - Freedom Technology
  - Freedom Consulting
  - DLH
  - mthree
  - Northwood Space

# Block locations associated with US military / intelligence (clearance-only sites).
location_block:
  - AFB
  - Air Force Base
  - Naval Base
  - Naval Station
  - Fort Bragg
  - Fort Meade
  - Fort Belvoir
  - Fort Hood
  - Fort Liberty
  - Fort Detrick
  - Fort Gordon
  - Quantico
  - Wright-Patterson
  - Annapolis Junction
  - Crane, IN
  - Dahlgren
  - Pax River
  - China Lake
  - Eglin
  - Hanscom
  - Patuxent
  - White Sands
  - Picatinny

# Kept for backwards compat — superseded by us_only above.
location_exclude: []
