name: Check new jobs

on:
  push:
    branches:
      - master
      - main
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

permissions:
  contents: write              # so the workflow can commit seen_jobs.json back

jobs:
  check:
    runs-on: ubuntu-latest
    concurrency:
      group: job-radar
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Run job radar
        env:
          GMAIL_FROM: ${{ secrets.GMAIL_FROM }}
          GMAIL_TO: ${{ secrets.GMAIL_TO }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python main.py

      - name: Commit updated seen_jobs.json
        if: always()
        run: |
          if git diff --quiet seen_jobs.json; then
            echo "No state changes to commit."
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add seen_jobs.json
            git commit -m "chore: update seen_jobs.json [skip ci]"
            git push
          fi
