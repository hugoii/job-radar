name: Check new jobs

on:
  push:
    branches:
      - master
      - main
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

permissions:
  contents: write              # so the workflow can commit seen_jobs.json back

env:
  # Use Node 24 runtime for JS actions — silences the deprecation warning for checkout@v4 / setup-python@v5.
  # Without this, GitHub will switch to Node 24 by default on 2026-06-02 and remove Node 20 on 2026-09-16.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  check:
    runs-on: ubuntu-latest
    concurrency:
      group: job-radar
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Run job radar
        env:
          GMAIL_FROM: ${{ secrets.GMAIL_FROM }}
          GMAIL_TO: ${{ secrets.GMAIL_TO }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python main.py

      - name: Commit state files
        if: always()
        run: |
          if git diff --quiet seen_jobs.json ats_companies.json; then
            echo "No state changes to commit."
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add seen_jobs.json ats_companies.json
            git commit -m "chore: update state files [skip ci]"
            git push
          fi
